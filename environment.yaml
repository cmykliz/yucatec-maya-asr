name: mayan-asr
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - ffmpeg                        # audio codec support (needed by pydub)
  - pip:
# ── Audio processing ──────────────────────────────────────────────
      - pydub==0.25.1             # WAV slicing
      - librosa                   # audio analysis / feature inspection
      - soundfile                 # reading/writing WAV files
      - torchcodec==0.10.0        # required by datasets>=2.19 for audio loading
# ── HuggingFace ecosystem ─────────────────────────────────────────
      - transformers==5.3.0       # MMS, wav2vec2, CTC training
      - datasets==4.7.0           # audiofolder loader, push_to_hub
      - evaluate==0.4.6           # WER metric
      - accelerate==1.13.0        # multi-GPU / mixed precision training
      - huggingface_hub==1.6.0    # push model + dataset to Hub
# ── ASR / speech ──────────────────────────────────────────────────
      - jiwer==4.0.0              # Word Error Rate calculation
      - torch==2.10.0             # PyTorch (CPU version — see note below)
      - torchaudio==2.10.0        # audio loading for torch
# ── Data / NLP utilities ──────────────────────────────────────────
      - pandas                    # metadata handling
      - numpy
# ── Dev / notebook ────────────────────────────────────────────────
      - jupyter
      - ipykernel
      - tqdm                      # progress bars